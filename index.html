<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Degree Certificate</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; padding: 50px; background-color: #f0f0f0; }
        .certificate { border: 10px solid #2c3e50; padding: 50px; background: white; width: 600px; text-align: center; box-shadow: 0 0 20px rgba(0,0,0,0.2); }
        h1 { color: #2c3e50; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; }
        .affiliation { font-style: italic; color: #7f8c8d; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="certificate">
        <h1>DEGREE CERTIFICATE</h1>
        <p>This is to certify that</p>
        <h2>[STUDENT NAME]</h2>
        <p>has successfully completed the requirements for the degree of</p>
        <h3>Bachelor of Science in Web Technology</h3>
        <div class="affiliation">
            <p>Affiliated with: Global University of Technology</p>
            <p>Date: April 2024</p>
        </div>
    </div>
</body>
</html>
